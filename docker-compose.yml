version: "3.8"

services:
  backend:
    build: ./backend
    container_name: smart-todo-backend
    ports:
      - "3001:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: always
  frontend:
    build: ./frontend
    container_name: smart-todo-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    restart: always
